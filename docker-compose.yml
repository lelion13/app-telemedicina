# =============================================================================
# App Telemedicina — Docker Compose (desarrollo / build local)
# Producción en VPS: usar docker-compose.prod.yml (imagen desde GHCR).
# Traefik en el VPS (host mode) descubre contenedores por labels Docker.
# =============================================================================

name: app-telemedicina

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telemedicina-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/telemedicina
      LIVEKIT_URL: ${LIVEKIT_URL:-wss://livekit.telemedicina.lionapp.cloud}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.telemedicina-app.rule=Host(`${APP_HOST:-telemedicina.lionapp.cloud}`)
      - traefik.http.routers.telemedicina-app.entrypoints=websecure
      - traefik.http.routers.telemedicina-app.tls=true
      - traefik.http.routers.telemedicina-app.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.telemedicina-app.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7
    container_name: telemedicina-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: telemedicina-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  livekit:
    image: livekit/livekit-server:v1.9.12
    container_name: telemedicina-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip ${LIVEKIT_NODE_IP:-}
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "7880"
    ports:
      # WebRTC requiere UDP en el host — Traefik no proxya UDP
      - "7881:7881/tcp"
      - "50000-50100:50000-50100/udp"
    labels:
      - traefik.enable=true
      - traefik.http.routers.telemedicina-livekit.rule=Host(`${LIVEKIT_HOST:-livekit.telemedicina.lionapp.cloud}`)
      - traefik.http.routers.telemedicina-livekit.entrypoints=websecure
      - traefik.http.routers.telemedicina-livekit.tls=true
      - traefik.http.routers.telemedicina-livekit.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.telemedicina-livekit.loadbalancer.server.port=7880
      - traefik.http.services.telemedicina-livekit.loadbalancer.server.scheme=http

volumes:
  mongo_data:
  redis_data:
