name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          AUTH_SECRET: ci-test-auth-secret-min-32-chars-long
          PATIENT_TOKEN_SECRET: ci-test-patient-secret-min-32-chars

      - name: Production build
        run: npm run build
        env:
          AUTH_SECRET: ci-test-auth-secret-min-32-chars-long
          PATIENT_TOKEN_SECRET: ci-test-patient-secret-min-32-chars
          MONGODB_URI: mongodb://localhost:27017/telemedicina
          LIVEKIT_URL: wss://livekit.example.com

      - name: Validate production compose
        run: |
          cp .env.prod.example .env.prod
          sed -i 's/LIVEKIT_NODE_IP=/LIVEKIT_NODE_IP=203.0.113.1/' .env.prod
          sed -i 's/tu-api-key/ci-test-livekit-key/' .env.prod
          sed -i 's/tu-api-secret/ci-test-livekit-secret-32chars-min/' .env.prod
          sed -i 's/generar-con-openssl-rand-base64-32/ci-test-auth-secret-min-32-chars-long/g' .env.prod
          sed -i 's/generar-secreto-distinto-a-nextauth/ci-test-patient-secret-min-32-chars/' .env.prod
          docker compose --env-file .env.prod -f docker-compose.prod.yml config --quiet
